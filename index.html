<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sanlogica — Clientes (vendedor)</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="screen-app" class="screen">
    <header class="topbar">
      <div>
        <h1>Clientes</h1>
        <p class="muted small">Sanlogica — mesmos dados do Gestor</p>
      </div>
    </header>

    <div class="toolbar">
      <input type="search" id="filter" placeholder="Buscar por nome…" autocomplete="off" />
      <label class="toggle">
        <input type="checkbox" id="only-active" />
        <span>Só ativos</span>
      </label>
    </div>

    <p id="load-status" class="muted">Carregando…</p>
    <p id="load-error" class="error" hidden></p>

    <div id="list" class="client-list"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
