<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Sanlogica — Clientes (vendedor)</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="screen-app" class="screen">
    <header class="topbar">
      <div>
        <h1>Clientes</h1>
        <p class="muted small">Sanlogica — mesmos dados do Gestor</p>
      </div>
    </header>

    <p id="load-status" class="muted">Carregando…</p>
    <p id="load-error" class="error" hidden></p>

    <section id="dashboard" class="dashboard" hidden aria-label="Resumo operacional">
      <div class="dashboard-head">
        <div>
          <h2 class="dashboard-title">Painel resumo</h2>
          <p class="dashboard-hint muted small">Indicadores no mesmo critério da tela Clientes do Gestor Sanlogica (último acesso e data de instalação).</p>
        </div>
      </div>

      <div id="kpi-primary" class="kpi-grid kpi-grid-primary"></div>

      <div class="dashboard-divider" role="presentation"></div>

      <h3 class="kpi-section-title">Composição da base</h3>
      <div id="kpi-secondary" class="kpi-grid kpi-grid-secondary"></div>

      <div class="insight-strip" id="insight-strip"></div>
    </section>

    <div class="list-section-head">
      <h2 class="list-section-title">Lista de clientes</h2>
    </div>
    <div class="toolbar">
      <input type="search" id="filter" placeholder="Buscar por nome…" autocomplete="off" />
      <label class="toggle">
        <input type="checkbox" id="only-active" />
        <span>Só ativos</span>
      </label>
    </div>

    <div id="list" class="client-list"></div>
  </div>

  <script src="js/firebase-config.js?v=539"></script>
  <script src="js/app.js?v=539"></script>
</body>
</html>
